{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        {% block meta_description %}{% endblock %}
        <title>
            {% block title %}AniListShare{% endblock %}
        </title>
        <link rel="icon" href="{% static 'animelist/logo.png' %}" type="image/png">
        <link rel="preconnect" href="https://cdnjs.cloudflare.com">
        <link rel="preload"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
              as="style">
        <link rel="preload" href="{% static 'animelist/style.css' %}" as="style">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        {% block extra_head_early %}{% endblock %}
        <link rel="stylesheet" href="{% static 'animelist/style.css' %}">
        {% block extra_head %}{% endblock %}
    </head>
    {% block body_tag %}<body>{% endblock %}
        {% block content %}{% endblock %}
        {% block extra_body %}{% endblock %}
    </body>
</html>
