{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Verify Email - password Reset</title>
        <link rel="icon" href="{% static 'animelist/logo.png' %}" type="image/png">
        <link rel="stylesheet" href="{% static 'animelist/style.css' %}">
        <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg);
        }

        .auth-card {
            background: var(--surface);
            padding: 32px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 6px -1px var(--border);
        }

        .auth-card h2 {
            margin-bottom: 12px;
            color: var(--text);
        }

        .auth-card p {
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .auth-card .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .auth-card .btn {
            width: 100%;
            margin-top: 8px;
        }

        .error-msg {
            background: rgba(199, 80, 80, 0.1);
            border: 1px solid rgba(199, 80, 80, 0.3);
            color: var(--danger);
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        </style>
    </head>
    <body>
        <div class="auth-card">
            <div class="auth-logo">
                <img src="{% static 'animelist/logo.png' %}"
                     alt="AniListShare Logo"
                     style="height: 64px;
                            width: auto;
                            object-fit: contain;
                            margin-bottom: 8px">
            </div>
            <h2>Verify Your Email</h2>
            <p>We've sent a 6-digit confirmation code to your email. It expires in 10 minutes.</p>
            {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text"
                           name="otp"
                           class="form-input"
                           required
                           placeholder="000000"
                           maxlength="6"
                           pattern="\d{6}"
                           title="Please enter a 6-digit code"
                           style="text-align:center;
                                  font-size:2em;
                                  letter-spacing:12px;
                                  padding: 16px">
                </div>
                <button type="submit" class="btn btn-accent">Verify Code</button>
            </form>
            <div style="margin-top: 20px;">
                <a href="{% url 'login' %}"
                   style="color: var(--text-muted);
                          text-decoration: none;
                          font-size: 0.85em">&larr; Back to login</a>
            </div>
        </div>
    </body>
</html>
