{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ owner_name }}'s Anime List</title>
        <link rel="icon" href="{% static 'animelist/logo.png' %}" type="image/png">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="{% static 'animelist/style.css' %}">
        <style>
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .share-badge {
            background-color: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Hide specific elements on shared view that might have accidently leaked */
        .drag-handle {
            cursor: default !important;
        }

        .drag-handle:active {
            cursor: default !important;
        }
        </style>
    </head>
    <body data-share-id="{{ share_id }}">
        <div class="header">
            <div class="header-title-container">
                <div class="header-brand">
                    <img src="{% static 'animelist/logo.png' %}"
                         alt="AniListShare Logo"
                         class="header-logo">
                    <h1>{{ owner_name }}'s List</h1>
                </div>
                <span class="share-badge">
                    <i class="fa-solid fa-eye"></i> Shared Read-Only
                </span>
            </div>
            <div class="header-search autocomplete-wrapper" id="localSearchWrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text"
                       id="localSearchInput"
                       class="form-input"
                       placeholder="Search this list..."
                       autocomplete="off">
                <div class="autocomplete-results" id="localSearchResults"></div>
            </div>
            <button class="mobile-search-btn"
                    id="mobileSearchBtn"
                    aria-label="Search"
                    onclick="openMobileSearchShared()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button class="hamburger-btn" id="mobileMenuBtn" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="header-actions" id="headerActions">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'index' %}" class="btn btn-ghost">Return to My List</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-ghost">Create Your Own List</a>
                {% endif %}
            </div>
        </div>
        <div class="tabs-bar" id="tabsBar"></div>
        <div class="container" id="categoriesContainer"></div>
        <div class="mobile-search-overlay" id="mobileSearchOverlay">
            <div class="mobile-search-header">
                <i class="fa-solid fa-magnifying-glass mobile-search-icon"></i>
                <input type="text"
                       id="mobileSearchInputShared"
                       class="form-input"
                       placeholder="Search this list…"
                       autocomplete="off">
                <button class="mobile-search-close"
                        onclick="closeMobileSearchShared()"
                        aria-label="Close search">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="mobile-search-results" id="mobileSearchResultsShared">
                <div class="mobile-search-placeholder">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <p>Type to search this list</p>
                </div>
            </div>
        </div>
        <!-- Load read-only JS -->
        <script>
        const shareId = document.body.dataset.shareId;
        let currentCategoryId = null;

        function switchTab(catId) {
            currentCategoryId = catId;
            localStorage.setItem('lastCategoryIdShared_' + shareId, catId);
            document.querySelectorAll(".tab-wrapper").forEach(t => t.classList.toggle("active", t.dataset.catId == catId));
            document.querySelectorAll(".category-panel").forEach(p => p.classList.toggle("active", p.dataset.catId == catId));
        }

        function renderStars(n, max = 10) {
            if (n === null || n === undefined) return '<span class="stars-display text-muted">—</span>';
            let html = '<span class="stars-display">';
            for (let i = 1; i <= max; i++) {
                html += i <= n ? '<i class="fa-solid fa-star"></i>' : '<span class="empty"><i class="fa-solid fa-star"></i></span>';
            }
            html += ` <span style="color:var(--text-muted);font-size:0.75rem">${n}/10</span></span>`;
            return html;
        }

        function buildSeasonBadgesReadOnly(seasons) {
            return seasons.map(s => {
                let progressAttr = '';
                let progressText = '';
                let classes = 'season-badge';
                let commentAttr = s.comment ? ` title="${s.comment.replace(/"/g, '&quot;')}"` : '';

                if (s.episodes_watched !== null && s.episodes_total !== null && s.episodes_total > 0) {
                    const pct = Math.min(100, Math.max(0, (s.episodes_watched / s.episodes_total) * 100));
                    progressAttr = `--progress: ${pct}%;`;
                    progressText = ` <span class="season-progress">(${s.episodes_watched}/${s.episodes_total})</span>`;
                    classes += ' has-progress';
                } else if (s.episodes_watched !== null) {
                    progressText = ` <span class="season-progress">(${s.episodes_watched}/?)</span>`;
                }

                return `<div style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: top; margin: 2px 3px; max-width: 90px; cursor: default;">
                    <span class="${classes}" style="margin: 0; width: 100%; justify-content: center; ${progressAttr}"${commentAttr}>${s.label}${progressText}</span>
                    ${s.comment ? `<span class="text-muted" style="font-size: 0.65rem; margin-top: 2px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;" title="${s.comment.replace(/"/g, '&quot;')}">${s.comment}</span>` : ''}
                </div>`;
            }).join('');
        }

        function buildTableRowReadOnly(anime, idx) {
            const thumb = anime.thumbnail_url
                ? `<img class="thumb" src="${anime.thumbnail_url}" alt="" loading="lazy">`
                : `<div class="thumb-placeholder"><span>N/A</span></div>`;

            return `<tr data-id="${anime.id}">
                <td class="col-num">${idx + 1}</td>
                <td class="col-thumb">${thumb}</td>
                <td class="col-name">
                    <div class="anime-title" style="font-weight: 500;">${anime.name}</div>
                    ${anime.reason ? `<div class="anime-reason text-muted" style="font-size: 0.75rem; margin-top: 4px;">${anime.reason}</div>` : ''}
                </td>
                <td class="col-seasons">${buildSeasonBadgesReadOnly(anime.seasons)}</td>
                <td class="col-lang">
                    ${anime.language ? anime.language.split(',').map(lang => `<span class="lang-badge">${lang.trim()}</span>`).join('') : '<span class="text-muted">—</span>'}
                </td>
                <td class="col-stars">${renderStars(anime.stars)}</td>
            </tr>`;
        }

        async function loadCategoryShared(catId) {
            const panel = document.querySelector(`.category-panel[data-cat-id="${catId}"]`);
            const tbody = panel.querySelector("tbody");
            try {
                const resp = await fetch(`/api/shared/${shareId}/anime/?category_id=${catId}`);
                if (!resp.ok) throw new Error("Failed to load");
                const data = await resp.json();
                if (data.anime.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>No anime in this category yet</p></div></td></tr>`;
                } else {
                    tbody.innerHTML = data.anime.map((a, i) => buildTableRowReadOnly(a, i)).join("");
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>Error loading list. <button class="btn btn-ghost btn-sm" onclick="loadCategoryShared('${catId}')">Retry</button></p></div></td></tr>`;
            }
        }

        function buildCategoryPanel(catId) {
            return `<div class="category-panel" data-cat-id="${catId}">
                <table class="anime-table">
                    <thead>
                        <tr>
                            <th class="col-num">#</th>
                            <th class="col-thumb"></th>
                            <th class="col-name">Name</th>
                            <th class="col-seasons">Seasons</th>
                            <th class="col-lang">Language</th>
                            <th class="col-stars">Stars</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6">
                                <div class="empty-state"><p>Loading…</p></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>`;
        }

        async function loadSharedCategories() {
            const tabsBar = document.getElementById("tabsBar");
            const container = document.getElementById("categoriesContainer");

            try {
                const resp = await fetch(`/api/shared/${shareId}/categories/`);
                if (!resp.ok) throw new Error("Failed to load categories");
                const data = await resp.json();
                const categories = data.categories || [];

                if (categories.length === 0) {
                    container.innerHTML = `<div class="empty-state"><p>This list has no categories yet.</p></div>`;
                    return;
                }

                tabsBar.innerHTML = categories.map(cat =>
                    `<div class="tab-wrapper" data-cat-id="${cat.id}">
                        <button class="tab" data-cat-id="${cat.id}">${cat.name}</button>
                    </div>`
                ).join("");

                container.innerHTML = categories.map(cat => buildCategoryPanel(cat.id)).join("");

                document.querySelectorAll(".tab").forEach(tab => {
                    tab.addEventListener("click", () => {
                        switchTab(tab.dataset.catId);
                        loadCategoryShared(tab.dataset.catId);
                    });
                });

                let targetCatId = categories[0].id;
                const lastCatId = localStorage.getItem('lastCategoryIdShared_' + shareId);
                if (lastCatId && categories.some(c => c.id == lastCatId)) {
                    targetCatId = lastCatId;
                }
                switchTab(targetCatId);

                const loadPromises = categories.map(cat => loadCategoryShared(cat.id));
                await Promise.all(loadPromises);
            } catch (err) {
                container.innerHTML = `<div class="empty-state"><p>Error loading list. <button class="btn btn-ghost btn-sm" onclick="loadSharedCategories()">Retry</button></p></div>`;
            }
        }

        function setupLocalSearchShared() {
            const input = document.getElementById("localSearchInput");
            const resultsBox = document.getElementById("localSearchResults");

            input.addEventListener("input", function () {
                const q = this.value.toLowerCase().trim();
                let matches = [];

                if (q.length > 0) {
                    document.querySelectorAll(`.category-panel`).forEach(panel => {
                        const rows = panel.querySelectorAll("tbody tr[data-id]");
                        const catTab = document.querySelector(`.tab[data-cat-id="${panel.dataset.catId}"]`);
                        const catName = catTab ? catTab.textContent : "";

                        rows.forEach(tr => {
                            const titleEl = tr.querySelector(".anime-title");
                            if (titleEl && titleEl.textContent.toLowerCase().includes(q)) {
                                matches.push({
                                    id: tr.dataset.id,
                                    name: titleEl.textContent,
                                    catId: panel.dataset.catId,
                                    catName: catName,
                                    tr: tr
                                });
                            }
                        });
                    });
                }

                if (matches.length > 0) {
                    resultsBox.innerHTML = matches.map(m => `
                        <div class="autocomplete-item" onclick="jumpToAnimeShared('${m.catId}', '${m.id}')">
                            <span class="ac-title">${m.name}</span>
                            <span class="ac-badge" style="background:var(--surface);color:var(--text-muted);font-size:0.7em">${m.catName}</span>
                        </div>
                    `).join("");
                    resultsBox.style.display = "block";
                } else {
                    resultsBox.style.display = "none";
                }
            });

            document.addEventListener("click", e => {
                if (!e.target.closest("#localSearchWrapper")) {
                    resultsBox.style.display = "none";
                }
            });
        }

        window.jumpToAnimeShared = function (catId, animeId) {
            switchTab(catId);
            document.getElementById("localSearchResults").style.display = "none";
            document.getElementById("localSearchInput").value = "";
            const row = document.querySelector(`tr[data-id="${animeId}"]`);
            if (row) {
                row.scrollIntoView({ behavior: "smooth", block: "center" });
                row.classList.add("highlight-flash");
                setTimeout(() => row.classList.remove("highlight-flash"), 1500);
            }
        };

        // ---------------------------------------------------------------------------
        // Mobile Full-Screen Search (Shared)
        // ---------------------------------------------------------------------------

        function openMobileSearchShared() {
            const overlay = document.getElementById("mobileSearchOverlay");
            const input = document.getElementById("mobileSearchInputShared");
            const results = document.getElementById("mobileSearchResultsShared");

            input.value = "";
            results.innerHTML = `<div class="mobile-search-placeholder">
                <i class="fa-solid fa-magnifying-glass"></i>
                <p>Type to search this list</p>
            </div>`;

            overlay.style.display = "flex";
            void overlay.offsetWidth;
            overlay.classList.add("open");
            document.body.style.overflow = "hidden";

            setTimeout(() => input.focus(), 100);
        }

        function closeMobileSearchShared() {
            const overlay = document.getElementById("mobileSearchOverlay");
            overlay.classList.remove("open");
            document.body.style.overflow = "";

            setTimeout(() => {
                if (!overlay.classList.contains("open")) {
                    overlay.style.display = "none";
                }
            }, 300);
        }

        function renderMobileStarsShared(n, max = 10) {
            if (n === null || n === undefined)
                return '<span class="msc-stars" style="color:var(--text-muted)">—</span>';
            let html = '<span class="msc-stars">';
            for (let i = 1; i <= max; i++) {
                html += i <= n ? '<i class="fa-solid fa-star"></i>' : '<span class="empty"><i class="fa-solid fa-star"></i></span>';
            }
            html += ` <span style="color:var(--text-muted);font-size:0.7rem">${n}/10</span></span>`;
            return html;
        }

        let mobileSearchTimeoutShared;

        function setupMobileSearchShared() {
            const input = document.getElementById("mobileSearchInputShared");
            const results = document.getElementById("mobileSearchResultsShared");

            if (!input || !results) return;

            function performMobileSearchShared() {
                const q = input.value.trim().toLowerCase();
                if (q.length < 2) {
                    results.innerHTML = `<div class="mobile-search-placeholder">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <p>Type to search this list</p>
                    </div>`;
                    return;
                }

                const allAnime = [];
                document.querySelectorAll(".category-panel").forEach(panel => {
                    const rows = panel.querySelectorAll("tbody tr[data-id]");
                    rows.forEach(tr => {
                        const titleEl = tr.querySelector(".anime-title");
                        const langEls = tr.querySelectorAll(".lang-badge");
                        const starEl = tr.querySelector(".col-stars").textContent.trim();
                        const thumbImg = tr.querySelector(".thumb");

                        const title = titleEl ? titleEl.textContent : "";
                        const thumbnail_url = thumbImg ? thumbImg.src : null;

                        let langs = [];
                        langEls.forEach(bad => langs.push(bad.textContent));
                        const language = langs.length > 0 ? langs.join(", ") : null;

                        let stars = null;
                        if(starEl !== "—") {
                           const parseMatch = starEl.match(/(\d+)\/10/);
                           if(parseMatch) stars = parseInt(parseMatch[1], 10);
                        }

                        allAnime.push({
                            id: tr.dataset.id,
                            catId: panel.dataset.catId,
                            name: title,
                            thumbnail_url: thumbnail_url,
                            language: language,
                            stars: stars
                        });
                    });
                });

                if (allAnime.length === 0) {
                    results.innerHTML = `<div class="mobile-search-no-results">
                        <i class="fa-solid fa-database"></i>
                        <p>No data loaded yet</p>
                    </div>`;
                    return;
                }

                const matches = allAnime.filter(a => a.name.toLowerCase().includes(q));

                if (matches.length === 0) {
                    results.innerHTML = `<div class="mobile-search-no-results">
                        <i class="fa-solid fa-face-sad-tear"></i>
                        <p>No matches found for "${input.value.trim()}"</p>
                    </div>`;
                    return;
                }

                results.innerHTML = matches.slice(0, 20).map(r => {
                    const thumbHtml = r.thumbnail_url
                        ? `<img src="${r.thumbnail_url}" alt="" loading="lazy" onerror="this.style.display='none'">`
                        : `<div class="msc-placeholder">N/A</div>`;

                    const langHtml = r.language
                        ? r.language.split(",").map(l => `<span class="lang-badge">${l.trim()}</span>`).join("")
                        : '<span style="color:var(--text-muted);font-size:0.75rem">—</span>';

                    return `<div class="mobile-search-card" data-id="${r.id}" data-cat-id="${r.catId}">
                        ${thumbHtml}
                        <div class="msc-info">
                            <div class="msc-title">${r.name.replace(/"/g, "&quot;")}</div>
                            <div class="msc-meta">${langHtml}</div>
                            <div style="margin-top:4px">${renderMobileStarsShared(r.stars)}</div>
                        </div>
                    </div>`;
                }).join("");

                results.querySelectorAll(".mobile-search-card").forEach(card => {
                    card.addEventListener("click", () => {
                        jumpToAnimeShared(card.dataset.catId, card.dataset.id);
                        closeMobileSearchShared();
                    });
                });
            }

            input.addEventListener("input", () => {
                clearTimeout(mobileSearchTimeoutShared);
                mobileSearchTimeoutShared = setTimeout(performMobileSearchShared, 200);
            });

            input.addEventListener("focus", () => {
                if (input.value.trim().length >= 2) {
                    performMobileSearchShared();
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const mobileMenuBtn = document.getElementById("mobileMenuBtn");
            const headerActions = document.getElementById("headerActions");
            if (mobileMenuBtn && headerActions) {
                mobileMenuBtn.addEventListener("click", () => {
                    headerActions.classList.toggle("show");
                });
            }

            setupLocalSearchShared();
            setupMobileSearchShared();
            loadSharedCategories();
        });
        </script>
    </body>
</html>
