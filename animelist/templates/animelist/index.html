{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Anime List</title>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
        <link rel="stylesheet" href="{% static 'animelist/style.css' %}">
    </head>
    <body>
        <div class="header">
            <h1>My Anime List</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="addCategory()">
                    <i class="fa-solid fa-folder-plus"></i>
                    Category
                </button>
                <button class="btn btn-accent" onclick="openAddModal()">
                    <i class="fa-solid fa-plus"></i> Add Anime
                </button>
            </div>
        </div>
        <div class="tabs-bar">
            {% for cat in categories %}
                <div class="tab-wrapper" data-cat-id="{{ cat.id }}">
                    <button class="tab" data-cat-id="{{ cat.id }}">{{ cat.name }}</button>
                    <button class="edit-cat-btn"
                            data-cat-id="{{ cat.id }}"
                            data-cat-name="{{ cat.name }}"
                            onclick="renameCategory(this.dataset.catId, this.dataset.catName)">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                </div>
            {% endfor %}
        </div>
        <div class="container">
            {% for cat in categories %}
                <div class="category-panel" data-cat-id="{{ cat.id }}">
                    <table class="anime-table">
                        <thead>
                            <tr>
                                <th class="col-num">#</th>
                                <th class="col-thumb"></th>
                                <th class="col-name">Name</th>
                                <th class="col-seasons">Seasons</th>
                                <th class="col-lang">Language</th>
                                <th class="col-stars">Stars</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="7">
                                    <div class="empty-state">
                                        <p>Loading…</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            {% endfor %}
        </div>
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modalTitle">Add Anime</h2>
                    <button class="modal-close" onclick="closeModal()">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="animeForm" onsubmit="event.preventDefault();saveAnime()">
                        <input type="hidden" id="animeIdField">
                        <input type="hidden" id="malIdInput">
                        <div class="form-group autocomplete-wrapper">
                            <label>Name</label>
                            <input type="text"
                                   id="nameInput"
                                   class="form-input"
                                   placeholder="Search anime name…"
                                   autocomplete="off">
                            <div class="autocomplete-results" id="autocompleteResults"></div>
                        </div>
                        <div class="form-group">
                            <label>Thumbnail URL</label>
                            <div class="thumbnail-editor">
                                <img id="thumbnailPreview"
                                     src=""
                                     alt=""
                                     onerror="this.style.display='none'"
                                     onload="this.style.display='block'">
                                <input type="text"
                                       id="thumbnailInput"
                                       class="form-input"
                                       placeholder="https://..."
                                       oninput="updateThumbnailPreview()">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="categorySelect" class="form-input">
                                {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Seasons Completed</label>
                            <div class="seasons-editor" id="seasonsContainer"></div>
                            <button type="button"
                                    class="btn btn-ghost btn-sm"
                                    onclick="addSeasonRow()"
                                    style="margin-top:4px">
                                <i class="fa-solid fa-plus"></i> Add Season
                            </button>
                        </div>
                        <div class="form-group">
                            <label>Language</label>
                            <input type="text"
                                   id="languageInput"
                                   class="form-input"
                                   placeholder="e.g. Eng, Hin, Jap"
                                   oninput="updateLanguagePreview()">
                            <div id="languagePreview"
                                 style="margin-top: 8px;
                                        display: flex;
                                        flex-wrap: wrap;
                                        gap: 4px"></div>
                        </div>
                        <div class="form-group">
                            <label>Stars (0-10)</label>
                            <div class="interactive-stars" id="interactiveStars">
                                <span class="star" data-val="1"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="2"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="3"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="4"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="5"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="6"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="7"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="8"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="9"><i class="fa-solid fa-star"></i></span>
                                <span class="star" data-val="10"><i class="fa-solid fa-star"></i></span>
                                <span class="stars-clear" id="starsClear" title="Clear rating"><i class="fa-solid fa-xmark"></i></span>
                            </div>
                            <input type="hidden" id="starsInput">
                        </div>
                        <div class="form-group">
                            <label>Notes / Reason</label>
                            <input type="text"
                                   id="reasonInput"
                                   class="form-input"
                                   placeholder="Optional">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <div id="deleteSection" style="display:none">
                        <button class="btn btn-danger btn-sm" onclick="deleteAnime()">Delete</button>
                    </div>
                    <div style="display:flex;gap:8px;margin-left:auto">
                        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                        <button class="btn btn-accent" onclick="saveAnime()">Save</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-overlay" id="quickSeasonModalOverlay">
            <div class="modal" style="max-width:320px;">
                <div class="modal-header">
                    <h2 id="qsLabel">Edit Season</h2>
                    <button class="modal-close" onclick="closeQuickSeasonModal()">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="number"
                               id="qsWatchedInput"
                               class="form-input"
                               placeholder="Watched"
                               min="0">
                        <span class="ep-sep">/</span>
                        <input type="number"
                               id="qsTotalInput"
                               class="form-input"
                               placeholder="Total"
                               min="1">
                        <button type="button"
                                class="btn btn-accent btn-sm"
                                onclick="processQuickComplete()"
                                title="Mark Complete">
                            <i class="fa-solid fa-check-double"></i>
                        </button>
                    </div>
                    <div style="margin-top:12px;">
                        <input type="text"
                               id="qsCommentInput"
                               class="form-input"
                               placeholder="Comment (optional)">
                    </div>
                </div>
                <div class="modal-footer">
                    <div style="display:flex;gap:8px;margin-left:auto">
                        <button class="btn btn-ghost" onclick="closeQuickSeasonModal()">Cancel</button>
                        <button class="btn btn-accent" onclick="saveQuickSeason()">Save</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="toast" id="toast"></div>
        <script src="{% static 'animelist/app.js' %}"></script>
    </body>
</html>
