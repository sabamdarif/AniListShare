{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>List Not Found - My Anime List</title>
        <link rel="stylesheet" href="{% static 'animelist/style.css' %}">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
        }

        .error-container h1 {
            font-size: 4rem;
            margin-bottom: 24px;
            color: var(--text);
        }

        .error-container p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            max-width: 500px;
            line-height: 1.6;
        }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>My Anime List</h1>
            <div class="header-actions">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'index' %}" class="btn btn-primary">My List</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-primary">Login</a>
                    <a href="{% url 'signup' %}" class="btn btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
        <div class="container">
            <div class="error-container">
                <i class="fa-solid fa-link-slash"
                   style="font-size: 5rem;
                          color: var(--text-muted);
                          margin-bottom: 24px"></i>
                <h1>List Not Found</h1>
                <p>
                    This list is either currently no longer available, the link is invalid, or the owner has disabled public
                    sharing.
                </p>
                <a href="/" class="btn btn-primary">Go Home</a>
            </div>
        </div>
    </body>
</html>
