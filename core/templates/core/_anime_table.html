<table class="anime_table" id="anime_table">
    <thead>
        <tr>
            <th class="col_id">#</th>
            <th class="col_thumb">Thumbnail</th>
            <th class="col_name">Name</th>
            <th class="col_season">Season</th>
            <th class="col_lang">Language</th>
            <th class="col_stars">Stars</th>
            {% if show_edit_column %}<th class="col_edit"></th>{% endif %}
        </tr>
    </thead>
    <tbody id="anime_table_body">
    </tbody>
</table>
